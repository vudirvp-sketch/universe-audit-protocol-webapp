name = "universe-audit-proxy"
main = "cors-proxy.js"
compatibility_date = "2024-01-01"

# Deploy with: cd worker && npx wrangler deploy
# Workers on *.workers.dev are automatically routed — no explicit routes needed.

# NOTE: [limits] cpu_ms is NOT supported on the Cloudflare Free plan.
# The Free plan has a default CPU limit of 10ms per invocation, which is
# sufficient for a pass-through proxy (I/O wait does NOT count as CPU time).
# Cloudflare Workers free plan has NO hard wall-clock timeout for HTTP requests —
# the Worker stays alive as long as the client is connected.
# If you upgrade to a paid plan, you can uncomment the following to increase
# the CPU limit for streaming:
# [limits]
# cpu_ms = 50000

# Environment variables (NOT secrets — just config)
# These are read by the Worker via the `env` parameter in fetch(request, env, ctx).
[vars]
MAX_REQUESTS_PER_MINUTE = "60"
MAX_BODY_SIZE_BYTES = "2097152"
# Provider timeout in milliseconds.
# Cloudflare Workers free plan has NO hard wall-clock limit for HTTP requests.
# The 10ms CPU limit does NOT apply to I/O wait (fetch, stream reading).
# 300s (5 minutes) allows even the slowest free-tier models to respond.
# Previously set to 25s based on incorrect assumption about free plan limits.
PROVIDER_TIMEOUT_MS = "300000"
# Streaming timeout in milliseconds. Same rationale as PROVIDER_TIMEOUT_MS.
# Once upstream sends headers, the HTTP connection is established and CF will
# not kill the Worker. 300s is a safety net for unresponsive upstreams.
PROVIDER_STREAMING_TIMEOUT_MS = "300000"
