name = "universe-audit-proxy"
main = "cors-proxy.js"
compatibility_date = "2024-01-01"

# REPLACE <your-subdomain> with your actual Cloudflare Workers subdomain
# Example: if your account gives you "my-audit" as subdomain, use:
# pattern = "audit-proxy.my-audit.workers.dev/*"
[env.production]
routes = [
  { pattern = "audit-proxy.<your-subdomain>.workers.dev/*" }
]
