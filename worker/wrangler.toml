name = "universe-audit-proxy"
main = "cors-proxy.js"
compatibility_date = "2024-01-01"

# Deploy with: cd worker && npx wrangler deploy
# Workers on *.workers.dev are automatically routed — no explicit routes needed.

# NOTE: [limits] cpu_ms is NOT supported on the Cloudflare Free plan.
# The Free plan has a default CPU limit of 10ms per invocation, which is
# sufficient for a pass-through proxy. If you upgrade to a paid plan,
# you can uncomment the following to increase the CPU limit for streaming:
# [limits]
# cpu_ms = 50000

# Environment variables (NOT secrets — just config)
# These are read by the Worker via the `env` parameter in fetch(request, env, ctx).
[vars]
MAX_REQUESTS_PER_MINUTE = "60"
MAX_BODY_SIZE_BYTES = "2097152"
# Provider timeout in milliseconds. Default: 25000 (25s) for Cloudflare free plan.
# On paid Workers Standard/Unbound plan, increase to "55000" (55s) for longer responses.
# IMPORTANT: Step 2 (52 criteria) can take 90-120s on slower models.
# On free plan: Worker is killed at ~30s regardless. For Step 2 to work,
# you MUST upgrade to paid Workers plan and set this to at least "55000".
PROVIDER_TIMEOUT_MS = "55000"
# Streaming timeout in milliseconds. Similar to PROVIDER_TIMEOUT_MS but for
# streaming requests. On free plan: max ~25s before Worker dies.
# On paid plan: can be much higher (e.g., "120000" for 2 minutes).
PROVIDER_STREAMING_TIMEOUT_MS = "120000"
